predictive_tracker:
  ros__parameters:
    use_sim_time: true
    input_topic: "/segmentation/obstacle"
    tracked_topic: "/tracked_obstacles"
    marker_topic: "/tracked_obstacle_markers"
    target_frame: "odom"
    voxel_leaf_size: 0.1
    cluster_tolerance: 0.35
    min_cluster_size: 8
    max_cluster_size: 5000
    association_distance_threshold: 0.8
    max_missed_frames: 5
    process_noise_accel: 2.0
    measurement_noise_position: 0.08
    min_confirmed_hits: 3
    min_dynamic_hits: 2
    dynamic_speed_threshold: 0.20
    publish_rate_hz: 20.0
    publish_prediction_missed_frames: 2
    velocity_arrow_scale: 0.5
    input_timeout_sec: 1.0
    latency_stats_enabled: true
    latency_report_interval: 50
