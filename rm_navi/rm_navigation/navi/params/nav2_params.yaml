controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 3.0
    
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      # yaw_goal_tolerance: 0.5
      yaw_goal_tolerance: 6.28


    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      default_critic_namespaces: ["dwb_critics", "tcpa_dcpa_critic"]
      debug_trajectory_details: True
      min_vel_x: -20.0
      min_vel_y: -20.0
      max_vel_x: 20.0  # 适配您的备份设置
      max_vel_y: 20.0
      max_vel_theta: 0.0
      min_speed_xy: -20.0
      max_speed_xy: 20.0
      min_speed_theta: 0.15
      acc_lim_x: 15.0
      acc_lim_y: 15.0
      acc_lim_theta: 5.0
      decel_lim_x: -15.0
      decel_lim_y: -15.0
      decel_lim_theta: -3.2
      vx_samples: 40
      vy_samples: 40
      vtheta_samples: 1
      sim_time: 0.8
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 2.0
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25

      # 【新增】定义什么叫“旋转停稳了”
      # 设大一点（比如 0.25），只要转得不快，就算停稳，立刻切下一个点
      rot_stopped_velocity: 0.25

      short_circuit_trajectory_evaluation: False # change
      stateful: True
      # critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      # 【修改后】删掉 "RotateToGoal"
      critics: ["Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist", "TCPADCPA"]
      # BaseObstacle.scale: 0.02
      # 【新增】加大对障碍物的恐惧 (BaseObstacle)
      # 如果它老是往障碍物堆里扎，说明它对碰撞的惩罚不够重视
      BaseObstacle.scale: 0.02  # 原值 0.02 -> 建议翻倍
      PathAlign.scale: 0.0
      PathAlign.forward_point_distance: 0.1
      # GoalAlign.scale: 24.0
      GoalAlign.scale: 0.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 5.0
      GoalDist.scale: 50.0
      TCPADCPA.plugin: "tcpa_dcpa_critic::TCPADCPACritic"
      TCPADCPA.scale: 10.0
      TCPADCPA.tau_safe: 2.0
      TCPADCPA.sigma_safe: 0.5
      TCPADCPA.tracked_topic: "/tracked_obstacles"
      RotateToGoal.scale: 0.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

    # FollowPath:
    #   plugin: "teb_local_planner::TebLocalPlannerROS"

    #   # --- 1. 运动学限制 (Translation Only) ---
    #   # 既然不能转，所有精力都分配给 X 和 Y
    #   max_vel_x: 2.0           # 前后最大速度 (参考 DWB 风格)
    #   max_vel_x_backwards: 2.0 # 后退速度
      
    #   # [关键] 必须给足够的 Y 轴速度，因为机器人现在主要靠横移
    #   max_vel_y: 2.0           # 左右横移最大速度
      
    #   # [关键] 彻底锁死旋转
    #   max_vel_theta: 0.0       # 禁止旋转
    #   acc_lim_theta: 10.0       # 禁止旋转加速度
      
    #   # [关键] 线性加速度 (决定起步和刹车的爆发力)
    #   acc_lim_x: 3.0           # 只有平移，加速度可以给大点
    #   acc_lim_y: 3.0           # Y轴同理

    #   # --- 2. 机器人形状 ---
    #   # --- 机器人形状：圆柱体 ---
    #   footprint_model: 
    #     type: "circular"
    #     radius: 0.23   # 您的机器人半径 (米)

    #   # --- 3. 目标容差 ---
    #   xy_goal_tolerance: 0.2   # 允许 20cm 误差
    #   yaw_goal_tolerance: 3.14 # [非常重要] 必须允许任意角度到达，否则永远停不下来
    #   free_goal_vel: False     

    #   # --- 4. 轨迹优化 ---
    #   dt_ref: 0.2              # 时间分辨率，越小控制越细腻
    #   dt_hysteresis: 0.1
    #   min_samples: 5
    #   global_plan_viapoint_sep: 0.15

    #   # --- 5. 权重设置 (核心性格) ---
    #   # [核心设置] 设为 0.0 代表这是一个全向移动机器人(Holonomic)
    #   # 如果设为 1000，它会像汽车一样必须先转弯再走，这会导致你的机器人卡死
    #   weight_kinematics_nh: 0.0 
      
    #   weight_kinematics_forward_drive: 0.0 
    #   weight_optimaltime: 10.0  # [重要] 极大提高时间权重，逼迫它走直线冲过去
    #   weight_obstacle: 50.0     # 避障权重
      
    #   # 既然不能旋转，这些关于旋转的权重设为0，减少计算量
    #   weight_max_vel_theta: 0.0
    #   weight_acc_lim_theta: 0.0

    #   # --- 6. 其他设置 ---
    #   min_obstacle_dist: 0.1
    #   inflation_dist: 0.2
    #   include_costmap_obstacles: True
    #   costmap_converter_plugin: "costmap_converter::CostmapToPolygonsDBSMCCH"
    #   costmap_converter_spin_thread: True
    #   costmap_converter_rate: 10.0
    #   global_plan_overwrite_orientation: True
    #   max_global_plan_lookahead_dist: 10.0
    #   global_plan_prune_distance: 0.1
    #   allow_init_with_backwards_motion: True # 允许它一开始就往后稍稍
      
controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      transform_tolerance: 2.0
      width: 5 # 保持 Galactic 默认，或者改为您备份的 2
      height: 5
      resolution: 0.05 #robot_radius 【统一】从 0.05 改为 0.1，减轻负载
      robot_radius: 0.18 # 【统一】适配您的机器人
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # cost_scaling_factor
        # 这个值越大，障碍物旁边的危险区衰减越快。
        # 意思是：只要不撞上，离近点也没事。这会让机器人敢于走直路穿过狭窄区域。
        cost_scaling_factor: 15.0
        inflation_radius: 0.2 # 【统一】适配您的备份
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: -0.5
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          # /scan 由 pointcloud_to_laserscan 以 base_link 为目标坐标系发布
          sensor_frame: base_link
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        map_subscribe_transient_local: True
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: True
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      transform_tolerance: 2.0
      robot_radius: 0.23 # 【统一】适配您的机器人
      resolution: 0.1  # 【统一】从 0.05 改为 0.1
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          # /scan 由 pointcloud_to_laserscan 以 base_link 为目标坐标系发布
          sensor_frame: base_link
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.27 # 【统一】适配您的备份
      always_send_full_costmap: True
  global_costmap_client:
    ros__parameters:
      use_sim_time: True
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: "turtlebot3_world.yaml"

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      # --- 原来的 NavFn (Dijkstra/A*) [已注释] ---
      # plugin: "nav2_navfn_planner/NavfnPlanner"
      # tolerance: 0.5
      # use_astar: true
      # allow_unknown: true

      # --- 新增：Theta* Planner (推荐) ---
      plugin: "nav2_theta_star_planner/ThetaStarPlanner"
      how_many_corners: 8      # 使用8邻域扩展
      w_euc_cost: 1.0          # 欧几里得距离权重
      w_traversal_cost: 2.0    # 遍历成本权重 (遇到高代价区域绕行的意愿，设高点比较安全)
      w_heuristic_cost: 1.0    # 启发式权重

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["backup", "wait"]
    
    # spin:
    #   plugin: "nav2_recoveries/Spin"
    
    backup:
      plugin: "nav2_recoveries/BackUp"
    
    wait:
      plugin: "nav2_recoveries/Wait"
      
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.1
    use_sim_time: True
    # simulate_ahead_time: 2.0
    # 【必须改】把 2.0 改成 0.8 甚至 0.5
    # 告诉它：别想那么远，只要眼前这一小步是安全的，就给我动！
    simulate_ahead_time: 0.8
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: True

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"   
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: False   # 原值 True -> 改为 False
      waypoint_pause_duration: 0 # 200
